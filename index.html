<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pulse — Lab'O</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #E8002A;
      --dark: #0f0f0f;
      --card: #1a1a1a;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #888;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,0,42,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,0,42,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Big decorative text */
    body::after {
      content: 'PULSE';
      position: fixed;
      bottom: -0.15em;
      right: -0.05em;
      font-family: 'Syne', sans-serif;
      font-size: clamp(100px, 22vw, 260px);
      font-weight: 800;
      color: transparent;
      -webkit-text-stroke: 1px rgba(232,0,42,0.12);
      pointer-events: none;
      line-height: 1;
      user-select: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
      animation: slideUp 0.5s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      background: var(--red);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232,0,42,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(232,0,42,0); }
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: var(--text);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--red);
    }

    input::placeholder {
      color: #444;
    }

    button {
      width: 100%;
      margin-top: 0.5rem;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 3px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.98); }

    .error {
      display: none;
      color: var(--red);
      font-size: 0.75rem;
      margin-top: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">LAB'O / PULSE</span>
    </div>
    <h1>Connexion</h1>
    <p class="subtitle">Accès communauté</p>

    <div class="field">
      <label for="id">Identifiant</label>
      <input type="text" id="id" placeholder="votre.identifiant" autocomplete="username"/>
    </div>

    <div class="field">
      <label for="mdp">Mot de passe</label>
      <input type="password" id="mdp" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button onclick="login()">Se connecter →</button>
    <p class="error" id="error">Veuillez remplir l'identifiant.</p>
  </div>

  <script>
    function login() {
      const id = document.getElementById('id').value.trim();
      const err = document.getElementById('error');

      if (!id) {
        err.style.display = 'block';
        return;
      }
      err.style.display = 'none';
      // On passe l'identifiant dans l'URL pour le récupérer page2
      window.location.href = 'page2.html?user=' + encodeURIComponent(id);
    }

    // Permettre validation avec Entrée
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>

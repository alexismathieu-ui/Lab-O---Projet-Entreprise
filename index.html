<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pulse — Lab'O</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">LAB'O / PULSE</span>
    </div>
    <h1>Connexion</h1>
    <p class="subtitle">Accès communauté</p>

    <div class="field">
      <label for="id">Identifiant</label>
      <input type="text" id="id" placeholder="votre.identifiant" autocomplete="username"/>
    </div>

    <div class="field">
      <label for="mdp">Mot de passe</label>
      <input type="password" id="mdp" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button onclick="login()">Se connecter →</button>
    <p class="error" id="error">Veuillez remplir l'identifiant.</p>
  </div>

  <script>
    function login() {
      const id = document.getElementById('id').value.trim();
      const err = document.getElementById('error');

      if (!id) {
        err.style.display = 'block';
        return;
      }
      err.style.display = 'none';
      // On passe l'identifiant dans l'URL pour le récupérer page2
      window.location.href = 'page2.html?user=' + encodeURIComponent(id);
    }

    // Permettre validation avec Entrée
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>

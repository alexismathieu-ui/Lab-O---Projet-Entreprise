<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab'O — Add Post</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Yanone+Kaffeesatz:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="choice.css" />
  </head>

  <body>
    <div class="phone-scene">
      <div class="phone">
        <!-- ── Status Bar (visible sur desktop uniquement) ────────── -->
        <div class="status-bar" aria-hidden="true">
          <div class="status-bar__time">
            <img src="" alt="" />
          </div>
          <div class="status-bar__right">
            <img src="" alt="" />
          </div>
        </div>

        <!-- ── Logo ──────────────────────────────────────────────── -->
        <div class="logo">
          <img
            class="logo__img"
            src="https://www.figma.com/api/mcp/asset/0a2c4e72-6eb3-4449-89b6-f539a2a3b7e0"
            alt="Logo Lab'O"
          />
        </div>

        <!-- ── CTA 1 ───────────────────────────────────────────── -->
        <a
          href="#"
          class="action-btn action-btn--question"
          role="button"
          aria-label="Répondre à la question du jour"
        >
          <span class="action-btn__label">Répondre à la question du jour</span>
        </a>

        <!-- ── CTA 2 ───────────────────────────────────────────── -->
        <a
          href="#"
          class="action-btn action-btn--news"
          role="button"
          aria-label="Ajouter une nouveauté"
        >
          <span class="action-btn__label">Ajouter une nouveauté</span>
        </a>

        <!-- ── Home Indicator (visible sur desktop uniquement) ──── -->
        <div class="home-indicator" aria-hidden="true"></div>
      </div>
    </div>
  </body>
</html>

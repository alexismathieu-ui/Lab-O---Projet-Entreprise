<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pulse — Bienvenue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #E8002A;
      --dark: #0f0f0f;
      --card: #1a1a1a;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #888;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,0,42,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,0,42,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    body::after {
      content: 'PULSE';
      position: fixed;
      bottom: -0.15em;
      right: -0.05em;
      font-family: 'Syne', sans-serif;
      font-size: clamp(100px, 22vw, 260px);
      font-weight: 800;
      color: transparent;
      -webkit-text-stroke: 1px rgba(232,0,42,0.12);
      pointer-events: none;
      line-height: 1;
      user-select: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      text-align: center;
      animation: slideUp 0.5s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      background: var(--red);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232,0,42,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(232,0,42,0); }
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.15em;
    }

    .welcome-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .username {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 8vw, 2.8rem);
      font-weight: 800;
      color: var(--red);
      word-break: break-all;
      margin-bottom: 0.5rem;
      animation: fadeIn 0.6s 0.3s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .tagline {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 2rem;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    a {
      display: inline-block;
      color: var(--muted);
      font-size: 0.75rem;
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }

    a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">LAB'O / PULSE</span>
    </div>

    <p class="welcome-label">Connecté en tant que</p>
    <div class="username" id="username">—</div>
    <p class="tagline">Bienvenue dans la communauté Lab'O 👋</p>

    <div class="divider"></div>
    <a href="index.html">← Se déconnecter</a>
  </div>

  <script>
    // Récupère l'identifiant depuis l'URL
    const params = new URLSearchParams(window.location.search);
    const user = params.get('user');

    if (user) {
      document.getElementById('username').textContent = user;
      document.title = 'Pulse — ' + user;
    } else {
      // Pas de user dans l'URL → retour accueil
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>

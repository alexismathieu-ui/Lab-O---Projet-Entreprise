<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse — Lab'O</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <div class="logo-dot"></div>
        <span class="logo-text">LAB'O</span>
      </div>
      <h1>Connexion</h1>
      <p class="subtitle">Accès communauté</p>

      <div class="field">
        <label for="email">Email</label>
        <input
          type="text"
          id="email"
          placeholder="votre@email.com"
          autocomplete="username"
        />
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button onclick="login()">Se connecter →</button>
      <button onclick="register()">S'inscrire</button>
      <p class="error" id="error" style="display:none"></p>
    </div>

    <script>
      const API = "";

      function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const err = document.getElementById("error");

        if (!email || !password) {
          err.style.display = "block";
          err.textContent = "Veuillez remplir tous les champs.";
          return;
        }

        fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.message === "Login success") {
              localStorage.setItem("user", email);
              window.location.href = "page2.html";
            } else {
              err.style.display = "block";
              err.textContent = data.message;
            }
          })
          .catch(() => {
            err.style.display = "block";
            err.textContent = "Erreur serveur — le backend est-il lancé ?";
          });
      }

      function register() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const err = document.getElementById("error");

        if (!email || !password) {
          err.style.display = "block";
          err.textContent = "Veuillez remplir tous les champs.";
          return;
        }

        fetch(`${API}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.message === "User saved in DB") {
              localStorage.setItem("user", email);
              window.location.href = "page2.html";
            } else {
              err.style.display = "block";
              err.textContent = data.message;
            }
          })
          .catch(() => {
            err.style.display = "block";
            err.textContent = "Erreur serveur — le backend est-il lancé ?";
          });
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });
    </script>
  </body>
</html>

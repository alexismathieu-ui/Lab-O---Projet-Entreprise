<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab'O — Répondre à la question du jour</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Yanone+Kaffeesatz:wght@300;600&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ═══════════════════════════════════════════════════════════
       DESIGN TOKENS — extracted from Figma node 65:2135
       Lab'o White: #F8F2EB  |  Lab'o Red: #E53530  |  Lab'o Black: #050707
    ═══════════════════════════════════════════════════════════ */
      :root {
        /* Colors */
        --color-labo-white: #f8f2eb;
        --color-labo-red: #e53530;
        --color-labo-black: #050707;
        --color-placeholder: rgba(30, 30, 30, 0.5);
        --color-page-bg: #ddd5c8;

        /* Typography */
        --font-primary: "Yanone Kaffeesatz", sans-serif;
        --fw-semibold: 600;
        --fw-light: 300;

        --fs-main: 28px;
        --fs-btn: 24px;
        --fs-required: 10px;

        --lh-main: 1.4;
        --ls-main: -0.56px;
        --ls-btn: -0.48px;
        --ls-required: -0.2px;

        /* Phone canvas — derived from Figma frame proportions        */
        /* Percentage anchors verified against absolute px positions: */
        /* 25.43 % × 1050 = 267 px  (title, above search-bar@366px)  */
        --phone-w: 402px;
        --phone-h: 1050px;

        /* Shadows */
        --shadow-btn: 2px 4px 4px 0px rgba(0, 0, 0, 0.25);

        /* Border */
        --border-red: 2px solid var(--color-labo-red);
      }

      /* ─── Reset ──────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ─── Page ───────────────────────────────────────────────── */
      html,
      body {
        width: 100%;
        min-height: 100%;
      }

      body {
        background-color: var(--color-page-bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-primary);
      }

      /* ─── Phone Scene (centering wrapper) ────────────────────── */
      .phone-scene {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      /* ─── Phone Shell ────────────────────────────────────────── */
      .phone {
        position: relative;
        width: var(--phone-w);
        height: var(--phone-h);
        background-color: var(--color-labo-white);
        border-radius: 50px;
        box-shadow:
          0 0 0 10px #1a1a1a,
          0 0 0 12px #3a3a3a,
          0 24px 80px rgba(0, 0, 0, 0.45);
        overflow-y: auto;
        overflow-x: hidden;
        flex-shrink: 0;
      }

      /* ════════════════════════════════════════════════════════════
       STATUS BAR  (top: 0, height: 72px)
    ════════════════════════════════════════════════════════════ */
      .status-bar {
        position: absolute;
        top: 0;
        left: 0;
        width: 402px;
        height: 72px;
        overflow: hidden;
        pointer-events: none;
      }

      .status-bar__time {
        position: absolute;
        left: 38px;
        top: 25px;
        width: 54px;
        height: 21px;
      }
      .status-bar__time img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .status-bar__right {
        position: absolute;
        right: 30.34px;
        top: 29px;
        width: 66.661px;
        height: 11.336px;
      }
      .status-bar__right img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      /* ════════════════════════════════════════════════════════════
       LOGO  (top: 126px, left: 144px, 114 × 114px)
    ════════════════════════════════════════════════════════════ */
      .logo {
        position: absolute;
        top: 126px;
        left: 144px;
        width: 114px;
        height: 114px;
      }
      .logo__img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
      }

      /* ════════════════════════════════════════════════════════════
       SECTION TITLE  — "Répondre à la question du jour"
       top: 25.43% × 1050 = 267px | left: 1.49% × 402 = 6px
       right: 33.08% × 402 = 133px → width: 402-133-6 = 263px
    ════════════════════════════════════════════════════════════ */
      .section-title {
        position: absolute;
        top: 267px;
        left: 6px;
        width: 263px;
        font-family: var(--font-primary);
        font-weight: var(--fw-semibold);
        font-size: var(--fs-main);
        color: var(--color-labo-black);
        letter-spacing: var(--ls-main);
        line-height: var(--lh-main);
      }

      /* Underline — top: 27.94% × 1050 = 293px */
      .section-title__underline {
        position: absolute;
        top: 293px;
        left: 12px;
        width: 234px;
        height: 2px;
        background-color: var(--color-labo-black);
      }

      /* ════════════════════════════════════════════════════════════
       FORM FLOW — conteneur en flux naturel.
       Positionné juste sous le titre (top: 316px), les éléments
       enfants s'empilent automatiquement sans top: px fixes.
       Plus de chevauchement quand la question est longue.
    ════════════════════════════════════════════════════════════ */
      .form-flow {
        position: absolute;
        top: 316px;
        left: 0;
        right: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: 80px;
      }

      /* ── Question ────────────────────────────────────────────── */
      .section-question {
        width: 300px;
        font-family: var(--font-primary);
        font-weight: var(--fw-semibold);
        font-size: var(--fs-main);
        color: var(--color-labo-black);
        letter-spacing: var(--ls-main);
        line-height: var(--lh-main);
        margin-bottom: 4px;
      }

      /* Underline */
      .section-question__underline {
        width: 226px;
        height: 1px;
        background-color: var(--color-labo-black);
        transform: rotate(0.25deg);
        margin-bottom: 22px;
        flex-shrink: 0;
        align-self: flex-start;
        margin-left: 54px;
      }

      /* ════════════════════════════════════════════════════════════
       FORM — conteneur flex colonne pour les champs
    ════════════════════════════════════════════════════════════ */
      form {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 294px;
      }

      /* ── Fields ──────────────────────────────────────────────── */
      .field {
        width: 100%;
      }
      .field--name {
        height: 48px;
        margin-bottom: 6px;
      }
      .field--message {
        height: 305px;
        margin-bottom: 6px;
      }

      .field__input,
      .field__textarea {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        border: var(--border-red);
        border-radius: 0;
        outline: none;
        font-family: var(--font-primary);
        font-weight: var(--fw-semibold);
        font-size: var(--fs-main);
        color: var(--color-labo-black);
        letter-spacing: var(--ls-main);
        line-height: var(--lh-main);
        padding: 0 9px;
        resize: none;
        -webkit-appearance: none;
        appearance: none;
      }

      .field__textarea {
        padding-top: 11px;
        vertical-align: top;
      }

      .field__input::placeholder,
      .field__textarea::placeholder {
        color: var(--color-placeholder);
        opacity: 1;
      }

      /* ── Required labels ─────────────────────────────────────── */
      .required {
        width: 100%;
        font-family: var(--font-primary);
        font-weight: var(--fw-light);
        font-size: var(--fs-required);
        color: var(--color-labo-red);
        letter-spacing: var(--ls-required);
        white-space: nowrap;
        padding-left: 9px;
      }
      .required--name {
        margin-bottom: 20px;
      }
      .required--message {
        margin-bottom: 20px;
      }

      /* ════════════════════════════════════════════════════════════
       ANIMATION DROPDOWN (styles conservés pour usage futur)
    ════════════════════════════════════════════════════════════ */
      .animation-select {
        position: absolute;
        top: 839px;
        left: 53px;
        width: 296px;
        height: 50px;
        border: var(--border-red);
        border-radius: 10px;
        cursor: pointer;
      }

      .animation-select__chevron {
        position: absolute;
        top: 849px;
        left: 62px;
        width: 30px;
        height: 30px;
        overflow: hidden;
        pointer-events: none;
      }
      .animation-select__chevron img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .animation-select__text {
        position: absolute;
        top: 865.5px;
        left: 102px;
        width: 187px;
        height: 27px;
        transform: translateY(-50%);
        font-family: var(--font-primary);
        font-weight: var(--fw-semibold);
        font-size: var(--fs-main);
        color: var(--color-placeholder);
        letter-spacing: var(--ls-main);
        line-height: var(--lh-main);
        display: flex;
        align-items: center;
        overflow: hidden;
        pointer-events: none;
      }

      /* ════════════════════════════════════════════════════════════
       SUBMIT BUTTON — "Envoyer"
    ════════════════════════════════════════════════════════════ */
      .submit-btn {
        width: 177px;
        height: 50px;
        background-color: var(--color-labo-white);
        border: var(--border-red);
        border-radius: 10px;
        box-shadow: var(--shadow-btn);
        font-family: var(--font-primary);
        font-weight: var(--fw-semibold);
        font-size: var(--fs-btn);
        color: var(--color-labo-black);
        letter-spacing: var(--ls-btn);
        line-height: var(--lh-main);
        text-align: center;
        cursor: pointer;
        -webkit-appearance: none;
        appearance: none;
        transition:
          opacity 0.12s ease,
          transform 0.12s ease;
      }
      .submit-btn:hover {
        opacity: 0.88;
      }
      .submit-btn:active {
        transform: scale(0.97);
        opacity: 0.8;
      }

      /* ════════════════════════════════════════════════════════════
       HOME INDICATOR  (bottom:10px, centered, 161 × 6px)
    ════════════════════════════════════════════════════════════ */
      .home-indicator {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 161px;
        height: 6px;
        background-color: var(--color-labo-black);
        border-radius: 100px;
      }

      /* ════════════════════════════════════════════════════════════
       RESPONSIVE — Tablet  ≤ 1024px
    ════════════════════════════════════════════════════════════ */
      @media (max-width: 1024px) {
        .phone-scene {
          padding: 32px 16px;
        }
      }

      /* ════════════════════════════════════════════════════════════
       RESPONSIVE — Mobile  ≤ 768px
       Scale the whole phone proportionally to viewport width.
       Un --scale CSS custom property est écrit par JS ; chaque
       élément lit cette valeur via calc().
    ════════════════════════════════════════════════════════════ */
      @media (max-width: 768px) {
        body {
          background-color: var(--color-labo-white);
          align-items: flex-start;
        }

        .phone-scene {
          padding: 0;
          width: 100%;
          min-height: 100vh;
          align-items: flex-start;
        }

        .phone {
          --scale: 1;
          width: 100vw;
          /* min-height pour que le contenu puisse dépasser 1050px si besoin */
          min-height: calc(var(--phone-h) * var(--scale));
          height: auto;
          border-radius: 0;
          box-shadow: none;
          overflow-x: hidden;
        }

        /* ── Éléments absolus (status bar, logo, titre) ───────── */
        .status-bar {
          width: 100%;
          transform: scale(var(--scale));
          transform-origin: top left;
        }

        .logo {
          top: calc(126px * var(--scale));
          left: 50%;
          transform: translateX(-50%);
          width: calc(114px * var(--scale));
          height: calc(114px * var(--scale));
        }

        .section-title {
          top: calc(267px * var(--scale));
          left: calc(6px * var(--scale));
          width: calc(263px * var(--scale));
          font-size: calc(var(--fs-main) * var(--scale));
          letter-spacing: calc(var(--ls-main) * var(--scale));
        }

        .section-title__underline {
          top: calc(293px * var(--scale));
          left: calc(12px * var(--scale));
          width: calc(234px * var(--scale));
          height: calc(2px * var(--scale));
        }

        /* ── Form flow et ses enfants ─────────────────────────── */
        .form-flow {
          top: calc(316px * var(--scale));
          padding-bottom: calc(80px * var(--scale));
        }

        .section-question {
          width: calc(300px * var(--scale));
          font-size: calc(var(--fs-main) * var(--scale));
          letter-spacing: calc(var(--ls-main) * var(--scale));
          margin-bottom: calc(4px * var(--scale));
        }

        .section-question__underline {
          width: calc(226px * var(--scale));
          margin-bottom: calc(22px * var(--scale));
          margin-left: calc(54px * var(--scale));
        }

        form {
          width: calc(294px * var(--scale));
        }

        .field--name {
          height: calc(48px * var(--scale));
          margin-bottom: calc(6px * var(--scale));
        }
        .field--message {
          height: calc(305px * var(--scale));
          margin-bottom: calc(6px * var(--scale));
        }

        .field__input,
        .field__textarea {
          font-size: calc(var(--fs-main) * var(--scale));
          padding: 0 calc(9px * var(--scale));
          letter-spacing: calc(var(--ls-main) * var(--scale));
        }
        .field__textarea {
          padding-top: calc(11px * var(--scale));
        }

        .required {
          font-size: calc(var(--fs-required) * var(--scale));
          padding-left: calc(9px * var(--scale));
        }
        .required--name {
          margin-bottom: calc(20px * var(--scale));
        }
        .required--message {
          margin-bottom: calc(20px * var(--scale));
        }

        .submit-btn {
          width: calc(177px * var(--scale));
          height: calc(50px * var(--scale));
          border-radius: calc(10px * var(--scale));
          font-size: calc(var(--fs-btn) * var(--scale));
          letter-spacing: calc(var(--ls-btn) * var(--scale));
        }
        .submit-btn:active {
          transform: scale(0.97);
        }

        .home-indicator {
          width: calc(161px * var(--scale));
          height: calc(6px * var(--scale));
          bottom: calc(10px * var(--scale));
          border-radius: 100px;
        }
      }
    </style>
  </head>

  <body>
    <div class="phone-scene">
      <main
        class="phone"
        role="main"
        aria-label="Répondre à la question du jour"
      >
        <!-- ── Status Bar ──────────────────────────────────────── -->
        <div class="status-bar" aria-hidden="true">
          <div class="status-bar__time">
            <img
              src="https://www.figma.com/api/mcp/asset/3f3fad32-1662-470b-a1df-50bc260e3da7"
              alt=""
            />
          </div>
          <div class="status-bar__right">
            <img
              src="https://www.figma.com/api/mcp/asset/88db2111-cb90-44ca-a519-18842c616097"
              alt=""
            />
          </div>
        </div>

        <!-- ── Logo ───────────────────────────────────────────── -->
        <div class="logo">
          <img
            class="logo__img"
            src="https://www.figma.com/api/mcp/asset/5dd9a6c0-e205-4d33-ac45-dfbcf30d520c"
            alt="Logo Lab'O"
          />
        </div>

        <!-- ── Section Title + Underline ─────────────────────── -->
        <h2 class="section-title">Répondre à la question du jour&nbsp;</h2>
        <div class="section-title__underline" aria-hidden="true"></div>

        <!-- ── Form Flow ──────────────────────────────────────── -->
        <!-- Conteneur flex colonne : la question et le formulaire -->
        <!-- s'empilent naturellement sans top: px fixes.          -->
        <div class="form-flow">
          <!-- Question (texte dynamique chargé par loadQuestion) -->
          <p class="section-question">
            Question&nbsp;: Ça va aujourd'hui&nbsp;?
          </p>

          <!-- Formulaire -->
          <form method="post" action="#" novalidate>
            <!-- Champ nom / pseudo -->
            <div class="field field--name">
              <input
                class="field__input"
                type="text"
                name="name"
                id="field-name"
                placeholder="Prénom/Pseudo/Boite..."
                autocomplete="name"
                aria-label="Prénom, Pseudo ou Boite"
                aria-required="true"
              />
            </div>
            <span class="required required--name" aria-live="polite"
              >*Réponse obligatoire</span
            >

            <!-- Champ message -->
            <div class="field field--message">
              <textarea
                class="field__textarea"
                name="message"
                id="field-message"
                placeholder="Message..."
                aria-label="Message"
                aria-required="true"
              ></textarea>
            </div>
            <span class="required required--message" aria-live="polite"
              >*Réponse obligatoire</span
            >

            <!-- Bouton envoi -->
            <button class="submit-btn" onclick="envoyerReponse()" type="button">
              Envoyer
            </button>
          </form>
        </div>

        <!-- ── Home Indicator ──────────────────────────────────── -->
        <div class="home-indicator" aria-hidden="true"></div>
      </main>
    </div>

    <script>
      /**
       * Proportional scaling for mobile viewports (≤ 768px).
       * The phone was designed at 402 × 1050 px.
       * On narrower screens we scale by width only and let
       * the content scroll vertically — matching native mobile UX.
       */
      (function () {
        var DESIGN_W = 402;
        var phone = document.querySelector(".phone");

        function applyScale() {
          if (window.innerWidth > 768) {
            phone.style.removeProperty("--scale");
            return;
          }
          var scale = (window.innerWidth / DESIGN_W).toFixed(6);
          phone.style.setProperty("--scale", scale);
        }

        applyScale();
        window.addEventListener("resize", applyScale);

        /* ── Animation-select keyboard accessibility ──────────── */
        var animSelect = document.querySelector(".animation-select");
        if (animSelect) {
          animSelect.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              var expanded =
                animSelect.getAttribute("aria-expanded") === "true";
              animSelect.setAttribute("aria-expanded", String(!expanded));
            }
          });
        }
      })();
    </script>

    <script>
      async function envoyerReponse() {
        const name = document.getElementById("field-name").value.trim();
        const text = document.getElementById("field-message").value.trim();
        if (!text) {
          alert("Écris ta réponse !");
          return;
        }
        try {
          const res = await fetch("/api/posts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              text,
              author: name || "Anonyme",
              category: "Info",
            }),
          });
          const data = await res.json();
          if (data._id) {
            // Affiche confirmation — crée l'élément s'il n'existe pas
            let ok = document.getElementById("qrSuccess");
            if (!ok) {
              ok = document.createElement("p");
              ok.id = "qrSuccess";
              ok.style.cssText =
                "position:absolute;bottom:80px;left:0;width:100%;text-align:center;font-family:var(--font-primary);font-weight:600;font-size:20px;color:#16a34a";
              document.querySelector(".phone").appendChild(ok);
            }
            ok.textContent = "✓ Message envoyé, en attente de validation !";
            ok.style.display = "block";
            document.getElementById("field-name").value = "";
            document.getElementById("field-message").value = "";
            setTimeout(() => {
              ok.style.display = "none";
            }, 3000);
          } else {
            alert("Erreur : " + (data.message || "inconnue"));
          }
        } catch (e) {
          alert("Erreur serveur, réessaie.");
        }
      }

      // Charge la question depuis le backend
      async function loadQuestion() {
        try {
          // 1. Essai : questions mensuelles depuis le store IndexedDB de l'écran
          const IDB_NAME = "labovca_store";
          const IDB_STORE = "data";
          const LS_KEY = "labovca_data_v6";

          const q = await new Promise((resolve) => {
            const req = indexedDB.open(IDB_NAME, 1);
            req.onsuccess = (e) => {
              const db = e.target.result;
              const tx = db.transaction(IDB_STORE, "readonly");
              const r = tx.objectStore(IDB_STORE).get(LS_KEY);
              r.onsuccess = (ev) => resolve(ev.target.result);
              r.onerror = () => resolve(null);
            };
            req.onerror = () => resolve(null);
          });

          if (q && q.questions) {
            const n = new Date();
            const qs = q.questions[n.getMonth() + 1];
            if (qs && qs.length) {
              const question = qs[(n.getDate() - 1) % qs.length];
              const el = document.querySelector(".section-question");
              if (el) el.textContent = "Question : " + question;
              return;
            }
          }

          // 2. Fallback : question forcée depuis MongoDB
          const res = await fetch("/api/question");
          if (!res.ok) return;
          const data = await res.json();
          if (data && data.text) {
            const el = document.querySelector(".section-question");
            if (el) el.textContent = "Question : " + data.text;
          }
        } catch (e) {
          console.warn("Chargement question échoué:", e);
        }
      }
      loadQuestion();
    </script>
  </body>
</html>

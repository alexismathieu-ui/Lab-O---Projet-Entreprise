<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – Gérer le calendrier</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Yanone+Kaffeesatz:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      
      :root {
        --color-bg: #f8f2eb;
        --color-black: #050707;
        --color-red: #e53530;
        --color-hover: #f99492;

        --font: "Yanone Kaffeesatz", sans-serif;
        --fw-bold: 700;
        --fw-semi: 600;

        --fs-title: 40px;
        --fs-event-name: 32px;
        --fs-event-date: 16px;
        --fs-create: 32px;
        --fs-btn: 28px;

        --ls-title: -0.8px;
        --ls-event-name: -0.64px;
        --ls-event-date: -0.32px;
        --ls-create: -0.64px;
        --ls-btn: -0.56px;

        --icon-size: 48px;
        --btn-w: 220px;
        --btn-h: 50px;
        --btn-radius: 10px;
        --event-h: 70px;
        --event-gap: 30px;
        --event-radius: 10px;
        --action-size: 50px;
        --action-radius: 5px;
        --create-w: 135px;
        --back-size: 60px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      ul,
      ol {
        list-style: none;
      }
      img {
        display: block;
        max-width: 100%;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
      }

      html,
      body {
        min-height: 100%;
        background-color: var(--color-bg);
        font-family: var(--font);
        color: var(--color-black);
      }

      .page {
        max-width: 1500px;
        margin: 0 auto;
        padding: 0 20px;
      }

      .page__header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 20px 0 0 28px;
      }
      .page__title {
        margin-top: 12px;
        font-size: var(--fs-title);
        font-weight: var(--fw-bold);
        letter-spacing: var(--ls-title);
        line-height: normal;
        white-space: nowrap;
      }
      .page__header-icons {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .page__icon {
        width: var(--icon-size);
        height: var(--icon-size);
        object-fit: contain;
        flex-shrink: 0;
      }

      .page__body {
        display: grid;
        grid-template-columns: 1fr 260px;
        margin-top: 100px;
        align-items: start;
        column-gap: 0;
      }

      .page__content {
        min-width: 0;
        padding-right: 20px;
      }

      .events__toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }

      .events__back {
        display: flex;
        align-items: center;
        justify-content: center;
        width: var(--back-size);
        height: var(--back-size);
        flex-shrink: 0;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      .events__back:hover {
        opacity: 0.65;
      }
      .events__back-icon {
        width: 30px;
        height: 30px;
        object-fit: contain;
        transform: rotate(90deg);
      }

      .events__create {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        width: var(--create-w);
        height: var(--btn-h);
        border: 2px solid var(--color-red);
        border-radius: var(--btn-radius);
        background: transparent;
        font-family: var(--font);
        font-weight: var(--fw-semi);
        font-size: var(--fs-create);
        color: var(--color-black);
        letter-spacing: var(--ls-create);
        line-height: 1.4;
        white-space: nowrap;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      .events__create:hover {
        opacity: 0.75;
      }
      .events__create-icon {
        width: 22px;
        height: 22px;
        object-fit: contain;
        flex-shrink: 0;
      }

      .events__scroll-wrapper {
        max-height: 590px;
        overflow-y: auto;
        padding-right: 8px;

        scrollbar-width: thin;
        scrollbar-color: var(--color-red) rgba(229, 53, 48, 0.2);
      }
      
      .events__scroll-wrapper::-webkit-scrollbar {
        width: 6px;
      }
      .events__scroll-wrapper::-webkit-scrollbar-track {
        background: rgba(229, 53, 48, 0.2);
        border-radius: 3px;
      }
      .events__scroll-wrapper::-webkit-scrollbar-thumb {
        background: var(--color-red);
        border-radius: 3px;
      }

      .events__list {
        display: flex;
        flex-direction: column;
        gap: var(--event-gap);
      }

      .event {
        display: flex;
        align-items: center;
        height: var(--event-h);
        border: 2px solid var(--color-red);
        border-radius: var(--event-radius);
        padding: 0 0 0 15px;
        flex-shrink: 0;
      }

      .event__info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-right: 12px;
      }
      .event__name {
        font-family: var(--font);
        font-weight: var(--fw-semi);
        font-size: var(--fs-event-name);
        color: var(--color-black);
        letter-spacing: var(--ls-event-name);
        line-height: 1.4;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .event__date {
        font-family: var(--font);
        font-weight: var(--fw-semi);
        font-size: var(--fs-event-date);
        color: var(--color-black);
        letter-spacing: var(--ls-event-date);
        line-height: 1.4;
      }

      .event__actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        padding: 0 10px 0 0;
      }
      .event__action {
        display: flex;
        align-items: center;
        justify-content: center;
        width: var(--action-size);
        height: var(--action-size);
        border: 2px solid var(--color-black);
        border-radius: var(--action-radius);
        background: transparent;
        cursor: pointer;
        flex-shrink: 0;
        transition: opacity 0.15s ease;
      }
      .event__action:hover {
        opacity: 0.65;
      }
      .event__action-icon {
        width: 28px;
        height: 28px;
        object-fit: contain;
      }

      .page__sidebar {
        border-left: 3px solid var(--color-black);
        padding-left: 30px;
        padding-top: 83px;
        align-self: stretch;
      }
      .manage__nav {
        display: flex;
        flex-direction: column;
        gap: 50px;
      }
      .manage__btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: var(--btn-w);
        height: var(--btn-h);
        border: 2px solid var(--color-red);
        border-radius: var(--btn-radius);
        background-color: var(--color-bg);
        font-family: var(--font);
        font-weight: var(--fw-semi);
        font-size: var(--fs-btn);
        color: var(--color-black);
        letter-spacing: var(--ls-btn);
        line-height: 1.4;
        white-space: nowrap;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      
      .manage__btn--active {
        background-color: var(--color-hover);
      }
      .manage__btn:not(.manage__btn--active):hover {
        opacity: 0.75;
        background-color: var(--color-hover);
      }

      @media (min-width: 1281px) {
        .event__name {
          font-size: var(--fs-event-name);
        }
        .events__create {
          font-size: var(--fs-create);
        }
      }

      @media (max-width: 1200px) {
        .page__sidebar {
          padding-left: 20px;
        }
        .manage__nav {
          gap: 70px;
        }
        .manage__btn {
          width: 190px;
          font-size: 24px;
        }
      }

      @media (max-width: 1024px) {
        .page {
          padding: 0 20px 36px;
        }

        .page__header {
          padding: 16px 0 0 0;
          margin-bottom: 24px;
        }
        .page__title {
          margin-top: 0;
          font-size: 30px;
        }
        .page__icon {
          width: 40px;
          height: 40px;
        }

        .page__body {
          display: flex;
          flex-direction: column;
          margin-top: 0;
          gap: 24px;
        }

        .page__content {
          padding-right: 0;
          order: 1;
        }

        .events__scroll-wrapper {
          max-height: none;
          overflow-y: visible;
          padding-right: 0;
        }

        .events__back {
          width: 48px;
          height: 48px;
        }
        .events__back-icon {
          width: 24px;
          height: 24px;
        }
        .events__create {
          width: auto;
          padding: 0 16px;
          font-size: 24px;
        }

        .event__name {
          font-size: 24px;
        }
        .event__date {
          font-size: 14px;
        }
        .event__action {
          width: 42px;
          height: 42px;
        }
        .event__action-icon {
          width: 24px;
          height: 24px;
        }

        .page__sidebar {
          border-left: none;
          border-top: 3px solid var(--color-black);
          padding-left: 0;
          padding-top: 20px;
          order: 2;
        }
        .manage__nav {
          flex-direction: row;
          flex-wrap: wrap;
          gap: 12px;
        }
        .manage__btn {
          width: auto;
          flex: 1 1 160px;
          min-width: 140px;
          padding: 0 14px;
          font-size: 22px;
          height: 46px;
        }
      }

      @media (max-width: 768px) {
        .page {
          padding: 0 14px 28px;
        }

        .page__header {
          padding: 14px 0 0;
          margin-bottom: 16px;
        }
        .page__title {
          font-size: 26px;
        }
        .page__icon {
          width: 32px;
          height: 32px;
        }
        .page__header-icons {
          gap: 10px;
        }

        .page__body {
          gap: 16px;
        }

        .events__toolbar {
          margin-bottom: 14px;
        }
        .events__back {
          width: 40px;
          height: 40px;
        }
        .events__back-icon {
          width: 20px;
          height: 20px;
        }
        .events__create {
          font-size: 20px;
          height: 42px;
          padding: 0 12px;
        }
        .events__create-icon {
          width: 18px;
          height: 18px;
        }

        .events__list {
          gap: 16px;
        }
        .event {
          height: auto;
          min-height: 60px;
          padding: 8px 8px 8px 12px;
        }
        .event__name {
          font-size: 20px;
        }
        .event__date {
          font-size: 13px;
        }
        .event__actions {
          gap: 6px;
          padding-right: 6px;
        }
        .event__action {
          width: 36px;
          height: 36px;
        }
        .event__action-icon {
          width: 20px;
          height: 20px;
        }

        .manage__nav {
          flex-direction: column;
          gap: 10px;
        }
        .manage__btn {
          width: 100%;
          font-size: 20px;
          height: 44px;
          padding: 0;
          flex: none;
        }
      }

      @media (max-width: 375px) {
        .page__title {
          font-size: 22px;
        }
        .page__icon {
          width: 28px;
          height: 28px;
        }
        .event__name {
          font-size: 18px;
        }
        .manage__btn {
          font-size: 18px;
          height: 40px;
        }
      }
    </style>
  </head>
  <body>

                  <button

              <li class="event">

                </div>
                <div class="event__actions">

        </main>

        <aside class="page__sidebar" aria-label="Actions de gestion">

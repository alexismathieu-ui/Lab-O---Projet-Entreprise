<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – Modération</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Yanone+Kaffeesatz:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      
      :root {
        --color-bg: #f8f2eb;
        --color-black: #050707;
        --color-red: #e53530;
        --color-hover: #f99492;

        --font: "Yanone Kaffeesatz", sans-serif;
        --fw-bold: 700;
        --fw-semi: 600;

        --fs-title: 40px;
        --fs-filter: 32px;
        --fs-btn: 28px;
        --ls-title: -0.8px;
        --ls-filter: -0.64px;
        --ls-btn: -0.56px;

        --icon-size: 48px;
        --btn-w: 220px;
        --btn-h: 50px;
        --btn-radius: 10px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      ul,
      ol {
        list-style: none;
      }
      img {
        display: block;
        max-width: 100%;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
      }

      html,
      body {
        min-height: 100%;
        background-color: var(--color-bg);
        font-family: var(--font);
        color: var(--color-black);
      }

      .page {
        max-width: 1500px;
        margin: 0 auto;
        padding: 0 20px;
      }

      .page__header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        
        padding: 20px 0 0 28px;
      }

      .page__title {
        
        margin-top: 12px;
        font-size: var(--fs-title);
        font-weight: var(--fw-bold);
        letter-spacing: var(--ls-title);
        line-height: normal;
        white-space: nowrap;
      }

      .page__header-icons {
        display: flex;
        align-items: center;
        gap: 16px;
        padding-top: 0;
      }

      .page__icon {
        width: var(--icon-size);
        height: var(--icon-size);
        object-fit: contain;
        flex-shrink: 0;
      }

      .page__body {
        display: grid;
        
        grid-template-columns: 1fr 260px;
        
        grid-template-rows: auto 1fr;
        margin-top: 100px;
        column-gap: 0;
      }

      .filters {
        grid-column: 1;
        grid-row: 1;
      }

      .page__content {
        min-width: 0;
        padding-right: 30px;
        grid-column: 1;
        grid-row: 2;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }

      .filters {
        padding-left: 59px;
        padding-bottom: 30px; 
        align-self: end; 
      }

      .filters__hamburger {
        display: none;
        flex-direction: column;
        justify-content: space-between;
        width: 30px;
        height: 20px;
        padding: 0;
      }
      .filters__hamburger-bar {
        display: block;
        width: 100%;
        height: 3px;
        background-color: var(--color-black);
        border-radius: 2px;
        transition:
          transform 0.3s ease,
          opacity 0.3s ease;
      }
      .filters__hamburger[aria-expanded="true"]
        .filters__hamburger-bar:nth-child(1) {
        transform: translateY(8.5px) rotate(45deg);
      }
      .filters__hamburger[aria-expanded="true"]
        .filters__hamburger-bar:nth-child(2) {
        opacity: 0;
        transform: scaleX(0);
      }
      .filters__hamburger[aria-expanded="true"]
        .filters__hamburger-bar:nth-child(3) {
        transform: translateY(-8.5px) rotate(-45deg);
      }

      .filters__list {
        display: flex;
        align-items: flex-end;
        
        gap: min(48px, 3.75vw);
      }

      .filters__link {
        display: inline-block;
        font-family: var(--font);
        font-weight: var(--fw-bold);
        
        font-size: min(var(--fs-filter), 2.5vw);
        color: var(--color-black);
        letter-spacing: var(--ls-filter);
        line-height: normal;
        white-space: nowrap;
        padding-bottom: 5px;
        position: relative;
      }
      
      .filters__link::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background-color: var(--color-black);
      }
      .filters__link:hover {
        color: var(--color-red);
      }
      .filters__link:hover::after {
        background-color: var(--color-red);
      }

      .page__screen {
        width: 100%;
        aspect-ratio: 960 / 540;
        border: 3px solid var(--color-black);
        overflow: hidden;
      }
      .page__screen img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .page__sidebar {
        grid-column: 2;
        grid-row: 1 / 3;
        border-left: 3px solid var(--color-black);
        padding-left: 30px;
        padding-top: 83px;
        align-self: stretch;
      }

      .manage__nav {
        display: flex;
        flex-direction: column;
        
        gap: 50px;
      }

      .manage__btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: var(--btn-w);
        height: var(--btn-h);
        border: 2px solid var(--color-red);
        border-radius: var(--btn-radius);
        background-color: var(--color-bg);
        font-family: var(--font);
        font-weight: var(--fw-semi);
        font-size: var(--fs-btn);
        color: var(--color-black);
        letter-spacing: var(--ls-btn);
        line-height: 1.4;
        white-space: nowrap;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      .manage__btn:hover {
        opacity: 0.75;
        background-color: var(--color-hover);
      }

      @media (min-width: 1281px) {
        .filters__link {
          font-size: var(--fs-filter);
        }
        .filters__list {
          gap: 48px;
        }
      }

      @media (max-width: 1200px) {
        .page__sidebar {
          padding-left: 20px;
        }
        .manage__nav {
          gap: 70px;
        }
        .manage__btn {
          width: 190px;
          font-size: 24px;
        }
      }

      @media (max-width: 1024px) {
        .page {
          padding: 0 20px 36px;
        }

        .page__header {
          padding: 16px 0 0 0;
          margin-bottom: 24px;
        }
        .page__title {
          margin-top: 0;
          font-size: 30px;
        }
        .page__icon {
          width: 40px;
          height: 40px;
        }

        .page__body {
          display: flex;
          flex-direction: column;
          margin-top: 0;
          gap: 24px;
        }

        .filters {
          padding-left: 0;
          padding-bottom: 0;
          align-self: auto;
          order: 1;
        }
        .filters__hamburger {
          display: flex;
          margin-bottom: 6px;
        }
        .filters__list {
          flex-direction: column;
          align-items: flex-start;
          gap: 0;
          max-height: 0;
          overflow: hidden;
          transition: max-height 0.35s ease;
        }
        .filters__list.is-open {
          max-height: 420px;
        }
        .filters__item {
          width: 100%;
        }
        .filters__link {
          display: block;
          font-size: 24px;
          padding: 10px 0;
          border-bottom: 1px solid rgba(5, 7, 7, 0.15);
        }
        .filters__link::after {
          display: none;
        }

        .page__content {
          order: 2;
        }
        .page__screen {
          width: 100%;
          border-width: 2px;
        }

        .page__sidebar {
          border-left: none;
          border-top: 3px solid var(--color-black);
          padding-left: 0;
          padding-top: 20px;
          align-items: flex-start;
          order: 3;
        }
        .manage__nav {
          flex-direction: row;
          flex-wrap: wrap;
          gap: 12px;
        }
        .manage__btn {
          width: auto;
          flex: 1 1 160px;
          min-width: 140px;
          padding: 0 14px;
          font-size: 22px;
          height: 46px;
        }
      }

      @media (max-width: 768px) {
        .page {
          padding: 0 14px 28px;
        }

        .page__header {
          padding: 14px 0 0;
          margin-bottom: 16px;
        }
        .page__title {
          font-size: 26px;
        }
        .page__icon {
          width: 32px;
          height: 32px;
        }
        .page__header-icons {
          gap: 10px;
        }

        .page__body {
          gap: 16px;
        }

        .filters__link {
          font-size: 21px;
          padding: 9px 0;
        }

        .manage__nav {
          flex-direction: column;
          gap: 10px;
        }
        .manage__btn {
          width: 100%;
          font-size: 20px;
          height: 44px;
          padding: 0;
          flex: none;
        }
      }

      @media (max-width: 375px) {
        .page__title {
          font-size: 22px;
        }
        .page__icon {
          width: 28px;
          height: 28px;
        }
        .manage__btn {
          font-size: 18px;
          height: 40px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      
      <header class="page__header">
        <h1 class="page__title">Modération</h1>
        <div class="page__header-icons">
          <img
            class="page__icon page__icon--bell"
            src="https://www.figma.com/api/mcp/asset/89650f9a-38f8-4693-a6f7-2e72223db9b5"
            alt="Notifications"
          />
          <img
            class="page__icon page__icon--account"
            src="https://www.figma.com/api/mcp/asset/9b1205fa-a241-4431-b137-67c9c31abbc2"
            alt="Mon compte"
          />
        </div>
      </header>

      <div class="page__body">
        
        <nav class="filters" aria-label="Filtres de contenu">
          
          <button
            class="filters__hamburger"
            aria-expanded="false"
            aria-controls="filters-list"
            aria-label="Afficher ou masquer les filtres"
          >
            <span class="filters__hamburger-bar"></span>
            <span class="filters__hamburger-bar"></span>
            <span class="filters__hamburger-bar"></span>
          </button>

          <ul class="filters__list" id="filters-list" role="list">
            <li class="filters__item">
              <a href="#" class="filters__link">Tous</a>
            </li>
            <li class="filters__item">
              <a href="#" class="filters__link">StartUps</a>
            </li>
            <li class="filters__item">
              <a href="#" class="filters__link">Annonces et Informations</a>
            </li>
            <li class="filters__item">
              <a href="#" class="filters__link">Sponsors</a>
            </li>
            <li class="filters__item">
              <a href="#" class="filters__link">Calendrier</a>
            </li>
          </ul>
        </nav>

        <div class="page__content">
          
          <section
            class="page__screen"
            aria-label="Aperçu de l'interface de modération"
          >
            <img
              src="https://www.figma.com/api/mcp/asset/1d797123-ad66-4404-ab4d-55d6562b2391"
              alt="Capture d'écran de l'interface principale de modération"
            />
          </section>
        </div>

        <aside class="page__sidebar" aria-label="Actions de gestion">
          <nav class="manage__nav" aria-label="Gestion du contenu">
            <a href="posts.html" class="manage__btn">Gérer les posts</a>
            <a href="annonces.html" class="manage__btn">Gérer les annonces</a>
            <a href="chatmanage.html" class="manage__btn">Gérer le chat</a>
            <a href="calendar.html" class="manage__btn">Gérer le calendrier</a>
            <a href="news.html" class="manage__btn">Gérer les nouveautés</a>
            <a href="partenaires.html" class="manage__btn"
              >Gérer les partenaires</a
            >
          </nav>
        </aside>
      </div>
      
    </div>

    <script>
      (function () {
        "use strict";

        var hamburger = document.querySelector(".filters__hamburger");
        var list = document.getElementById("filters-list");
        if (!hamburger || !list) return;

        hamburger.addEventListener("click", function () {
          var isOpen = this.getAttribute("aria-expanded") === "true";
          this.setAttribute("aria-expanded", String(!isOpen));
          list.classList.toggle("is-open", !isOpen);
        });

        list.querySelectorAll(".filters__link").forEach(function (link) {
          link.addEventListener("click", function () {
            hamburger.setAttribute("aria-expanded", "false");
            list.classList.remove("is-open");
          });
        });
      })();
    </script>
  </body>
</html>

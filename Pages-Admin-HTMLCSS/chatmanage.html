<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – Gérer le chat</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Yanone+Kaffeesatz:wght@600;700&family=Source+Sans+Pro:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      
      :root {
        --color-bg: #f8f2eb;
        --color-black: #050707;
        --color-red: #e53530;
        --color-hover: #f99492;
        --color-msg: #d9d9d9;

        --font: "Yanone Kaffeesatz", sans-serif;
        --font-msg: "Source Sans Pro", sans-serif;
        --fw-bold: 700;
        --fw-semi: 600;

        --fs-title: 40px;
        --fs-btn: 28px;
        --fs-username: 16px;

        --ls-title: -0.8px;
        --ls-btn: -0.56px;

        --icon-size: 48px;
        --btn-w: 220px;
        --btn-h: 50px;
        --btn-radius: 10px;
        --back-size: 60px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      ul,
      ol {
        list-style: none;
      }
      img {
        display: block;
        max-width: 100%;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
      }

      html,
      body {
        min-height: 100%;
        background-color: var(--color-bg);
        font-family: var(--font);
        color: var(--color-black);
      }

      .page {
        max-width: 1500px;
        margin: 0 auto;
        padding: 0 20px;
      }

      .page__header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 20px 0 0 28px;
      }
      .page__title {
        margin-top: 12px;
        font-size: var(--fs-title);
        font-weight: var(--fw-bold);
        letter-spacing: var(--ls-title);
        line-height: normal;
        white-space: nowrap;
      }
      .page__header-icons {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .page__icon {
        width: var(--icon-size);
        height: var(--icon-size);
        object-fit: contain;
        flex-shrink: 0;
      }

      .page__body {
        display: grid;
        grid-template-columns: 1fr 260px;
        margin-top: 100px;
        align-items: start;
        column-gap: 0;
      }

      .page__content {
        min-width: 0;
        padding-right: 20px;
        display: flex;
        flex-direction: column;
        min-height: 640px;
      }

      .chat__back {
        display: flex;
        align-items: center;
        justify-content: center;
        width: var(--back-size);
        height: var(--back-size);
        flex-shrink: 0;
        align-self: flex-start;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      .chat__back:hover {
        opacity: 0.65;
      }
      .chat__back-icon {
        
        width: 30px;
        height: 30px;
        object-fit: contain;
        transform: rotate(90deg);
      }

      .chat__messages {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding-bottom: 10px;
      }

      .chat__group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .chat__username {
        font-family: var(--font-msg);
        font-weight: var(--fw-bold);
        font-size: var(--fs-username);
        color: var(--color-red);
        line-height: normal;
      }

      .chat__bar {
        height: 20px;
        background-color: var(--color-msg);
        border-radius: 2px;
        flex-shrink: 0;
      }
      
      .chat__bar--full {
        width: 100%;
      } 
      .chat__bar--med {
        width: 62%;
      } 
      .chat__bar--short {
        width: 49%;
      } 

      .page__sidebar {
        border-left: 3px solid var(--color-black);
        padding-left: 30px;
        padding-top: 83px;
        align-self: stretch;
      }
      .manage__nav {
        display: flex;
        flex-direction: column;
        gap: 50px;
      }
      .manage__btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: var(--btn-w);
        height: var(--btn-h);
        border: 2px solid var(--color-red);
        border-radius: var(--btn-radius);
        background-color: var(--color-bg);
        font-family: var(--font);
        font-weight: var(--fw-semi);
        font-size: var(--fs-btn);
        color: var(--color-black);
        letter-spacing: var(--ls-btn);
        line-height: 1.4;
        white-space: nowrap;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      
      .manage__btn--active {
        background-color: var(--color-hover);
      }
      .manage__btn:not(.manage__btn--active):hover {
        opacity: 0.75;
        background-color: var(--color-hover);
      }

      @media (min-width: 1281px) {
        .manage__btn {
          font-size: var(--fs-btn);
        }
      }

      @media (max-width: 1200px) {
        .page__sidebar {
          padding-left: 20px;
        }
        .manage__nav {
          gap: 70px;
        }
        .manage__btn {
          width: 190px;
          font-size: 24px;
        }
      }

      @media (max-width: 1024px) {
        .page {
          padding: 0 20px 36px;
        }

        .page__header {
          padding: 16px 0 0 0;
          margin-bottom: 24px;
        }
        .page__title {
          margin-top: 0;
          font-size: 30px;
        }
        .page__icon {
          width: 40px;
          height: 40px;
        }

        .page__body {
          display: flex;
          flex-direction: column;
          margin-top: 0;
          gap: 24px;
        }

        .page__content {
          padding-right: 0;
          order: 1;
          min-height: 360px;
        }

        .page__sidebar {
          border-left: none;
          border-top: 3px solid var(--color-black);
          padding-left: 0;
          padding-top: 20px;
          order: 2;
        }
        .manage__nav {
          flex-direction: row;
          flex-wrap: wrap;
          gap: 12px;
        }
        .manage__btn {
          width: auto;
          flex: 1 1 160px;
          min-width: 140px;
          padding: 0 14px;
          font-size: 22px;
          height: 46px;
        }
      }

      @media (max-width: 768px) {
        .page {
          padding: 0 14px 28px;
        }

        .page__header {
          padding: 14px 0 0;
          margin-bottom: 16px;
        }
        .page__title {
          font-size: 26px;
        }
        .page__icon {
          width: 32px;
          height: 32px;
        }
        .page__header-icons {
          gap: 10px;
        }

        .page__body {
          gap: 16px;
        }

        .chat__back {
          width: 40px;
          height: 40px;
        }
        .chat__back-icon {
          width: 20px;
          height: 20px;
        }

        .chat__messages {
          gap: 12px;
        }
        .chat__bar {
          height: 16px;
        }

        .manage__nav {
          flex-direction: column;
          gap: 10px;
        }
        .manage__btn {
          width: 100%;
          font-size: 20px;
          height: 44px;
          padding: 0;
          flex: none;
        }
      }

      @media (max-width: 375px) {
        .page__title {
          font-size: 22px;
        }
        .page__icon {
          width: 28px;
          height: 28px;
        }
        .manage__btn {
          font-size: 18px;
          height: 40px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      
      <header class="page__header">
        <h1 class="page__title">Modération</h1>
        <div class="page__header-icons">
          <img
            class="page__icon page__icon--bell"
            src="https://www.figma.com/api/mcp/asset/b738c485-d764-422a-ac48-2bb1dc26b36a"
            alt="Notifications"
          />
          <img
            class="page__icon page__icon--account"
            src="https://www.figma.com/api/mcp/asset/1c63901c-2f8c-449a-9c61-99f5da0a822f"
            alt="Mon compte"
          />
        </div>
      </header>

      <div class="page__body">
        
        <main class="page__content">
          
          <a href="dashboard.html" class="chat__back" aria-label="Retour">
            
            <img
              class="chat__back-icon"
              src="https://www.figma.com/api/mcp/asset/5b774e15-5223-4ef6-94f0-e68bae11bf82"
              alt="Retour"
            />
          </a>

          <div class="chat__messages">
            
            <div class="chat__group">
              <span class="chat__username">User 4</span>
              <div class="chat__bar chat__bar--full"></div>
              <div class="chat__bar chat__bar--med"></div>
            </div>

            <div class="chat__group">
              <span class="chat__username">User 3</span>
              <div class="chat__bar chat__bar--short"></div>
            </div>

            <div class="chat__group">
              <span class="chat__username">User 2</span>
              <div class="chat__bar chat__bar--full"></div>
              <div class="chat__bar chat__bar--short"></div>
            </div>

            <div class="chat__group">
              <span class="chat__username">User 1</span>
              <div class="chat__bar chat__bar--full"></div>
              <div class="chat__bar chat__bar--full"></div>
              <div class="chat__bar chat__bar--med"></div>
            </div>
          </div>
          
        </main>

        <aside class="page__sidebar" aria-label="Actions de gestion">
          <nav class="manage__nav" aria-label="Gestion du contenu">
            <a href="posts.html" class="manage__btn">Gérer les posts</a>
            <a href="annonces.html" class="manage__btn">Gérer les annonces</a>
            
            <a href="chatmanage.html" class="manage__btn manage__btn--active"
              >Gérer le chat</a
            >
            <a href="calendar.html" class="manage__btn">Gérer le calendrier</a>
            <a href="news.html" class="manage__btn">Gérer les nouveautés</a>
            <a href="partenaires.html" class="manage__btn"
              >Gérer les partenaires</a
            >
          </nav>
        </aside>
      </div>
      
    </div>

    <script>
      (function () {
        "use strict";
        
      })();
    </script>
  </body>
</html>
